<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="ew" id="ew">

  <!-- LIST SCREEN -->
  <div class="sc" id="ec-list">
    <div class="sb">
      <span class="sb-t" id="ec-t1">9:41</span>
      <div class="sb-r">
        <div class="wfi"><span></span><span></span><span></span></div>
        <div class="sig"><span></span><span></span><span></span><span></span></div>
        <div class="bat"><div class="bat-body"><div class="bat-fill"></div></div><div class="bat-tip"></div></div>
      </div>
    </div>
    <div class="tb">
      <h1>Messages</h1>
      <div class="srch">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="5" stroke="#8e8e93" stroke-width="1.5"/><path d="M10 10l2.5 2.5" stroke="#8e8e93" stroke-width="1.5" stroke-linecap="round"/></svg>
        Search
      </div>
    </div>
    <div class="cl" id="ec-cl"></div>
    <div class="empty" id="ec-empty" style="display:none">
      <div class="empty-ico">💬</div>
      <p>No messages yet.<br>Tap <b>+</b> to start.</p>
    </div>
    <button class="fab" id="ec-newbtn">
      <svg width="18" height="18" viewBox="0 0 22 22" fill="none"><path d="M11 4v14M4 11h14" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- CHAT SCREEN -->
  <div class="sc off" id="ec-chat">
    <div class="sb">
      <span class="sb-t" id="ec-t2">9:41</span>
      <div class="sb-r">
        <div class="wfi"><span></span><span></span><span></span></div>
        <div class="sig"><span></span><span></span><span></span><span></span></div>
        <div class="bat"><div class="bat-body"><div class="bat-fill"></div></div><div class="bat-tip"></div></div>
      </div>
    </div>
    <div class="ch">
      <button class="bk" id="ec-back">
        <svg width="8" height="14" viewBox="0 0 10 16" fill="none"><path d="M8.5 1.5L1.5 8l7 6.5" stroke="#007aff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Back
      </button>
      <div class="hc">
        <div class="hav" id="ec-hav">?</div>
        <div class="hn" id="ec-hn">—</div>
        <div class="h-online">online</div>
      </div>
      <div style="width:50px"></div>
    </div>
    <div class="ma" id="ec-ma"></div>
    <div class="ia">
      <button class="bdg" id="ec-bdg">
        <span class="sd" id="ec-sd"></span>
        <span id="ec-bdgt">Tap to switch</span>
        <svg width="8" height="5" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="#8e8e93" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      </button>
      <div class="ir">
        <button class="eb" id="ec-eb">🙂</button>
        <div class="ib"><textarea id="ec-ta" rows="1" placeholder="iMessage"></textarea></div>
        <button class="sb2" id="ec-sb" disabled>
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 11.5V2.5M3 6.5l4-4 4 4" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- NEW CHAT MODAL -->
  <div class="ov" id="ec-nm"><div class="sh">
    <div class="hdl"></div>
    <div class="mt">New Conversation</div>
    <div class="mf"><div class="ml">Name</div><input class="mi" id="ec-ncn" type="text" placeholder="Enter name" autocomplete="off"/></div>
    <button class="mb" id="ec-ncs">Start Chat</button>
    <button class="mc" id="ec-ncc">Cancel</button>
  </div></div>

  <!-- SEND MODAL -->
  <div class="ov" id="ec-sm"><div class="sh">
    <div class="hdl"></div>
    <div class="mt">Who's sending?</div>
    <div class="mf"><div class="ml">Sender</div>
      <div class="wtabs">
        <button class="wt ws" id="ec-te">Elio</button>
        <button class="wt wu" id="ec-to">Other</button>
      </div>
    </div>
    <div class="mf"><div class="ml">Date &amp; Time</div>
      <div style="display:flex;gap:8px">
        <input class="mi" id="ec-sd2" type="text" placeholder="dd.mm.yyyy" style="flex:1.4"/>
        <input class="mi" id="ec-st" type="text" placeholder="hh:mm" style="flex:1"/>
      </div>
    </div>
    <button class="mb" id="ec-sc">Send</button>
  </div></div>

  <!-- EMOJI PANEL -->
  <div class="ep" id="ec-ep">
    <div class="etop"><div class="ets" id="ec-ets"></div><button class="ecl" id="ec-ecl">✕</button></div>
    <div class="eg" id="ec-eg"></div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
